name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Build distribution artifacts
        run: |
          uv build
          uvx twine check --strict dist/*
      - name: Verify tag matches built version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import pathlib, re, sys

          wheels = list(pathlib.Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              sys.exit(f"Expected 1 wheel, found {len(wheels)}: {wheels}")

          # PEP 427 wheel filename: {name}-{version}-{tags}.whl
          match = re.match(r"[^-]+-([^-]+)-", wheels[0].name)
          if not match:
              sys.exit(f"Cannot parse version from wheel: {wheels[0].name}")

          built_version = match.group(1)
          expected_tag = f"v{built_version}"
          actual_tag = "${{ github.ref_name }}"

          if actual_tag != expected_tag:
              sys.exit(f"Tag/version mismatch: tag={actual_tag}, wheel={expected_tag}")
          print(f"OK: {actual_tag} matches wheel version {built_version}")
          PY
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist-artifacts
          path: python/dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist-artifacts
          path: dist
      - name: Publish distribution artifacts to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist-artifacts
          path: dist
      - name: Publish distribution artifacts to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          attestations: false
